name: Generate Feeds

# This fork only self-hosts the BLOGS (incl. pi.website) and YOUTUBE feeds,
# using the free Supadata key. X tweets + podcasts are pulled live from the
# upstream central feed by prepare-digest.js, so no X / pod2txt keys are needed.

on:
  schedule:
    # Run at 22:00 UTC (06:00 Asia/Singapore) so feeds are fresh ~2h before
    # the 08:00 SGT (00:00 UTC) digest delivery.
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to fetch'
        required: false
        default: 'blogs+youtube'
        type: choice
        options:
          - blogs+youtube
          - blogs-only
          - youtube-only

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Generate feeds
        env:
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: |
          MODE="${{ inputs.mode }}"
          cd scripts
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$MODE" = "blogs-only" ]; then
            node generate-feed.js --blogs-only
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$MODE" = "youtube-only" ]; then
            node generate-feed.js --youtube-only
          else
            node generate-feed.js --blogs-only
            node generate-feed.js --youtube-only
          fi

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-blogs.json feed-youtube.json state-feed.json
          git diff --cached --quiet || git commit -m "chore: update feeds [skip ci]"
          git push
